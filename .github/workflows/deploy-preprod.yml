name: Deploy CyberCampus CTF - Preprod

on:
  push:
    branches:
      - preprod

jobs:
  deploy-preprod:
    name: Deploy to Preprod
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy
        run: |
          cd /var/www/preprod
          echo "📥 Pull des dernières modifications..."
          git pull origin preprod
          echo "🛑 Arrêt des conteneurs preprod..."
          sudo docker-compose -p preprod -f docker-compose.preprod.yml down
          echo "🚀 Rebuild et relance preprod..."
          sudo docker-compose -p preprod -f docker-compose.preprod.yml up --build -d
          echo "✅ Déploiement preprod terminé !"

  promote-to-main:
    name: Promote preprod → main
    needs: deploy-preprod
    runs-on: self-hosted
    if: contains(github.event.head_commit.message, '[deploy-prod]')
    steps:
      - name: Checkout full repo
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - name: Squash merge preprod into main
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          echo "🔑 Mot magique [deploy-prod] détecté !"
          
          # Retire [deploy-prod] du message + nettoie les espaces en trop
          CLEAN_MSG=$(echo "$COMMIT_MSG" | sed 's/\[deploy-prod\]//g' | sed 's/[[:space:]]*$//' | sed 's/^[[:space:]]*//')
          
          # Si le message est vide après nettoyage, message par défaut
          if [ -z "$CLEAN_MSG" ]; then
            CLEAN_MSG="Release preprod → main"
          fi
          
          echo "📝 Message du commit : $CLEAN_MSG"
          echo "🔄 Squash merge preprod → main..."
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout main
          git pull origin main
          git merge --squash origin/preprod
          git commit -m "$CLEAN_MSG"
          git push origin main
          
          echo "✅ Main mis à jour avec un commit propre !"