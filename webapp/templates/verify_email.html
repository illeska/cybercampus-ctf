{% extends "base.html" %}
{% block title %}Vérification Email - CyberCampus CTF{% endblock %}

{% block content %}
<section class="form-wrapper">
  <h2>✉️ Vérification Email</h2>
  
  <div class="verify-card">
    <div class="verify-icon">📧</div>
    <p class="verify-desc">
      Un code à 6 chiffres a été envoyé à<br>
      <strong style="color: #00f5c0;">{{ user.email }}</strong>
    </p>
    <p style="color: #64748b; font-size: 0.85rem;">Le code expire dans 15 minutes.</p>

    <!-- Formulaire de vérification -->
    <form method="POST" class="verify-form">
      <input type="hidden" name="action" value="verify">
      <div class="code-inputs">
        <input type="text" name="code" class="code-input" 
               maxlength="6" placeholder="000000" 
               autocomplete="off" required autofocus/>
      </div>
      <button type="submit" class="btn primary-btn">✅ Vérifier</button>
    </form>

    <!-- Bouton renvoyer -->
    <form method="POST" class="resend-form">
      <input type="hidden" name="action" value="resend">
      {% if can_resend %}
        <button type="submit" class="btn resend-btn">🔄 Renvoyer un code</button>
      {% else %}
        <button type="button" class="btn resend-btn disabled" disabled>
          🔄 Renvoyer dans <span id="countdown">{{ resend_countdown }}</span>s
        </button>
      {% endif %}
    </form>
  </div>
</section>

<script>
  // Compte à rebours pour le bouton renvoyer
  {% if not can_resend %}
  let countdown = {{ resend_countdown }};
  const countdownEl = document.getElementById('countdown');
  const resendBtn = document.querySelector('.resend-btn');

  const interval = setInterval(() => {
    countdown--;
    countdownEl.textContent = countdown;
    if (countdown <= 0) {
      clearInterval(interval);
      resendBtn.disabled = false;
      resendBtn.classList.remove('disabled');
      resendBtn.innerHTML = '🔄 Renvoyer un code';
      // Soumettre automatiquement possible ou juste activer le bouton
    }
  }, 1000);
  {% endif %}

  // Focus automatique et formatage du champ code
  const codeInput = document.querySelector('.code-input');
  codeInput.addEventListener('input', function() {
    this.value = this.value.replace(/[^0-9]/g, '');
  });
</script>

<style>
.verify-card {
  background: rgba(15, 23, 36, 0.6);
  border: 1px solid rgba(255, 255, 255, 0.08);
  border-radius: 16px;
  padding: 40px;
  text-align: center;
  max-width: 400px;
  margin: 0 auto;
}

.verify-icon {
  font-size: 4rem;
  margin-bottom: 20px;
}

.verify-desc {
  color: #cbd5e1;
  line-height: 1.7;
  margin-bottom: 10px;
}

.verify-form {
  margin: 25px 0 15px 0;
  max-width: 100%;
  padding: 0;
  background: none;
  border: none;
  box-shadow: none;
}

.code-inputs {
  margin-bottom: 20px;
}

.code-input {
  width: 100%;
  padding: 18px;
  font-size: 2rem;
  text-align: center;
  letter-spacing: 10px;
  background: #050a10;
  border: 2px solid rgba(0, 245, 192, 0.3);
  border-radius: 10px;
  color: #00f5c0;
  font-family: 'Orbitron', sans-serif;
  transition: all 0.3s ease;
}

.code-input:focus {
  outline: none;
  border-color: #00f5c0;
  box-shadow: 0 0 20px rgba(0, 245, 192, 0.2);
}

.resend-form {
  margin-top: 15px;
  padding: 0;
  background: none;
  border: none;
  box-shadow: none;
}

.resend-btn {
  background: rgba(255, 255, 255, 0.05);
  border: 1px solid rgba(255, 255, 255, 0.1);
  color: #94a3b8;
  font-size: 0.9rem;
  padding: 10px 20px;
}

.resend-btn:hover:not(.disabled) {
  background: rgba(0, 245, 192, 0.1);
  border-color: rgba(0, 245, 192, 0.3);
  color: #00f5c0;
}

.resend-btn.disabled {
  opacity: 0.5;
  cursor: not-allowed;
  transform: none !important;
  box-shadow: none !important;
}
</style>
{% endblock %}
